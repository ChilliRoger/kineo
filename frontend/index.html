<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kineo - Voice Return Agent</title>
    <!-- Neo-Brutalist Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Color Palette */
            --bg-color: #FFF9EE;      /* Off-White */
            --card-bg: #FFFFFF;       /* Pure White */
            --text-color: #000000;    /* Pitch Black */
            --border-color: #000000;  /* Pitch Black */
            
            /* Accent Colors */
            --accent-green: #CCFF00;  /* Acid Green */
            --accent-red: #FF4911;    /* Harsh Red */
            --accent-blue: #1100FF;   /* Electric Blue */
            --accent-yellow: #FFE600; /* Bright Yellow */
            --accent-pink: #FF00FF;   /* Hot Pink */

            /* Dimensions */
            --border-width: 3px;
            --shadow-offset: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border: var(--border-width) solid var(--border-color);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        /* Typography */
        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: var(--border-width) solid var(--border-color);
            padding-bottom: 20px;
        }

        .logo h1 {
            font-size: 64px;
            color: var(--text-color);
            line-height: 1;
            /* Text Shadow for depth */
            text-shadow: 3px 3px 0px var(--accent-yellow);
        }

        .logo p {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-color);
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
            background: var(--accent-green);
            display: inline-block;
            padding: 4px 12px;
            border: 2px solid var(--border-color);
            box-shadow: 3px 3px 0px var(--border-color);
        }

        /* Forms & Inputs */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: var(--border-width) solid var(--border-color);
            background: #FAFAFA;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            color: var(--text-color);
            border-radius: 0; /* Sharp corners */
            box-shadow: 4px 4px 0px var(--border-color);
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            background: var(--accent-yellow);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border-color);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 16px 24px;
            border: var(--border-width) solid var(--border-color);
            border-radius: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);
            transition: all 0.1s ease;
            position: relative;
        }

        button:active {
            transform: translate(var(--shadow-offset), var(--shadow-offset));
            box-shadow: 0px 0px 0px var(--border-color);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #FFFFFF;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-green);
            color: var(--text-color);
        }

        .btn-danger {
            background: var(--accent-red);
            color: #FFFFFF;
        }

        .btn-danger:hover:not(:disabled) {
            background: #000000;
            color: var(--accent-red);
        }

        /* Status Indicators */
        .status-indicator {
            padding: 16px;
            border: var(--border-width) solid var(--border-color);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            background: #FFFFFF;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .status-connecting { background: var(--accent-yellow); }
        .status-listening { background: var(--accent-green); }
        .status-speaking { background: var(--accent-blue); color: white; }
        .status-idle { background: #f0f0f0; }

        .status-dot {
            width: 16px;
            height: 16px;
            background: currentColor;
            border: 2px solid var(--border-color);
            border-radius: 0; /* Square dot */
        }

        /* Transcript Area */
        .transcript-area {
            background: #FFFFFF;
            border: var(--border-width) solid var(--border-color);
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 25px;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.1);
        }

        .message {
            margin-bottom: 20px;
            padding: 16px;
            border: 2px solid var(--border-color);
            font-size: 16px;
            line-height: 1.4;
            max-width: 85%;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .message-user {
            background: var(--accent-green);
            margin-left: auto;
            border-radius: 0;
            text-align: right;
        }

        .message-agent {
            background: #FFFFFF;
            margin-right: auto;
            border-radius: 0;
            text-align: left;
        }

        .message-system {
            background: #E0E0E0;
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-align: center;
            margin: 0 auto 20px auto;
            font-style: normal;
            border-style: dashed;
        }

        .message-timestamp {
            display: block;
            margin-top: 8px;
            font-family: 'Inter', monospace;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* Churn Indicator */
        .churn-indicator {
            padding: 16px;
            border: var(--border-width) solid var(--border-color);
            margin-bottom: 25px;
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--border-color);
            display: none;
        }

        .churn-low { background: var(--accent-green); }
        .churn-medium { background: var(--accent-yellow); }
        .churn-high { background: var(--accent-red); color: white; }

        /* Helpers */
        .hidden { display: none; }
        
        /* Customer Info */
        .customer-info {
            background: #FFFFFF;
            border: var(--border-width) solid var(--border-color);
            padding: 20px;
            margin-bottom: 25px;
            display: none;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .customer-info h3 {
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
            background: var(--bg-color);
            border-left: 2px solid var(--border-color);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--text-color);
            border: 2px solid var(--text-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <h1>Kineo</h1>
            <p>Voice Return Agent · E-Commerce Churn Prevention</p>
        </div>

        <!-- Customer ID Input -->
        <div id="setupSection">
            <div class="input-group">
                <label for="customerId">Customer ID</label>
                <input 
                    type="text" 
                    id="customerId" 
                    placeholder="Enter customer ID (e.g., customer_001)"
                    value="customer_001"
                />
            </div>
            <button class="btn-primary" onclick="startSession()">Start Session</button>
        </div>

        <!-- Customer Info -->
        <div id="customerInfo" class="customer-info">
            <h3>Customer Profile</h3>
            <div id="customerDetails"></div>
        </div>

        <!-- Session Section -->
        <div id="sessionSection" class="hidden">
            <!-- Status Indicator -->
            <div id="status" class="status-indicator status-idle">
                <div class="status-dot"></div>
                <span id="statusText">Idle</span>
            </div>

            <!-- Churn Risk Indicator -->
            <div id="churnIndicator" class="churn-indicator">
                <span id="churnText">Churn Risk: Unknown</span>
            </div>

            <!-- Video Feed (hidden by default) -->
            <div id="videoContainer" class="video-container">
                <video id="videoFeed" autoplay muted></video>
            </div>

            <!-- Transcript Area -->
            <div id="transcript" class="transcript-area">
                <div class="message message-system">
                    <div>Session starting... Type your message below!</div>
                </div>
            </div>

            <!-- Text Input for Testing -->
            <div class="input-group">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message here (e.g., 'I received the wrong item and I'm frustrated')"
                    onkeypress="if(event.key === 'Enter') sendMessage()"
                />
                <button class="btn-primary" onclick="sendMessage()" style="margin-top: 15px;">Send Message</button>
            </div>

            <!-- Control Buttons -->
            <div class="button-group">
                <button class="btn-primary" onclick="requestOffer()" id="offerBtn">Request Win-Back Offer</button>
                <button class="btn-danger" onclick="endSession()" id="endBtn">End Session</button>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        // GLOBAL STATE
        // ═══════════════════════════════════════════════════════════
        let ws = null;
        let sessionId = null;
        let currentCustomerId = null;
        let mediaRecorder = null;
        let audioStream = null;
        let videoStream = null;

        const API_BASE = window.location.origin;
        const WS_BASE = API_BASE.replace('http', 'ws');

        // ═══════════════════════════════════════════════════════════
        // SESSION MANAGEMENT
        // ═══════════════════════════════════════════════════════════

        async function startSession() {
            const customerIdInput = document.getElementById('customerId');
            const customerId = customerIdInput.value.trim();

            if (!customerId) {
                alert('Please enter a customer ID');
                return;
            }

            try {
                // Fetch customer profile
                updateStatus('connecting', 'Loading customer profile...');
                
                const response = await fetch(`${API_BASE}/customer/${customerId}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error('Customer not found');
                }

                currentCustomerId = customerId;
                displayCustomerInfo(data.customer);

                // Initialize WebSocket
                updateStatus('connecting', 'Connecting to agent...');
                ws = new WebSocket(`${WS_BASE}/session`);

                ws.onopen = () => {
                    // Send customer ID to establish session
                    ws.send(JSON.stringify({
                        type: 'init',
                        customer_id: customerId
                    }));
                };

                ws.onmessage = handleWebSocketMessage;

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('idle', 'Connection error');
                };

                ws.onclose = () => {
                    console.log('WebSocket closed');
                    updateStatus('idle', 'Session ended');
                };

                // Show session section
                document.getElementById('setupSection').classList.add('hidden');
                document.getElementById('sessionSection').classList.remove('hidden');

                // Request microphone access
                await initializeAudio();

            } catch (error) {
                alert(`Error starting session: ${error.message}`);
                updateStatus('idle', 'Error');
            }
        }

        async function endSession() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'end_session' }));
                ws.close();
            }

            // Stop audio/video capture
            stopAudioCapture();
            stopVideoCapture();

            // Stop media streams
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
            }
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }

            // Reset UI
            document.getElementById('setupSection').classList.remove('hidden');
            document.getElementById('sessionSection').classList.add('hidden');
            document.getElementById('customerInfo').style.display = 'none';
            document.getElementById('churnIndicator').style.display = 'none';
            document.getElementById('transcript').innerHTML = '<div class="message message-system"><div>Session ended</div></div>';

            updateStatus('idle', 'Idle');
        }

        // ═══════════════════════════════════════════════════════════
        // SEND MESSAGE FUNCTION
        // ═══════════════════════════════════════════════════════════

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
                console.log('Cannot send message - no connection or empty message');
                return;
            }

            console.log('📤 Sending user message:', message);

            // Send to backend
            ws.send(JSON.stringify({
                type: 'transcript',
                text: message
            }));

            // Clear input
            input.value = '';

            // Show in transcript immediately
            addTranscriptMessage('user', message);
        }

        // ═══════════════════════════════════════════════════════════
        // WEBSOCKET MESSAGE HANDLING
        // ═══════════════════════════════════════════════════════════

        function handleWebSocketMessage(event) {
            const message = JSON.parse(event.data);

            switch (message.type) {
                case 'session_started':
                    sessionId = message.session_id;
                    updateStatus('listening', 'Ready! Type your message below');
                    addTranscriptMessage('system', `Session started: ${sessionId}`);
                    break;

                case 'transcript':
                    // Only display agent messages from WebSocket
                    // User messages are already shown when sent
                    if (message.role === 'agent') {
                        addTranscriptMessage(message.role, message.text);
                        updateStatus('speaking', 'Agent is responding...');
                        speakText(message.text);
                    }
                    break;

                case 'offer':
                    updateStatus('speaking', 'Agent is responding...');
                    addTranscriptMessage('agent', message.text);
                    
                    // Parse churn level from offer message
                    detectChurnLevel(message.text);
                    
                    // Speak the offer
                    speakText(message.text);
                    break;

                case 'audio_response':
                    // Play Gemini's voice response
                    updateStatus('speaking', 'Agent is speaking...');
                    playAudioResponse(message.data || message.audio_data);
                    break;

                case 'error':
                    addTranscriptMessage('system', `Error: ${message.message}`);
                    console.error('Session error:', message.message);
                    break;
            }
        }

        async function playAudioResponse(data) {
            try {
                // Check if this is text-to-speech format
                if (data.startsWith('TEXT_TO_SPEAK:')) {
                    const text = data.substring('TEXT_TO_SPEAK:'.length);
                    speakText(text);
                    return;
                }

                // Otherwise treat as audio data
                try {
                    // Decode base64 to ArrayBuffer
                    const binaryString = atob(data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }

                    // Create audio context if not exists
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)({
                            sampleRate: 16000
                        });
                    }

                    // Decode audio data
                    const audioBuffer = await audioContext.decodeAudioData(bytes.buffer);

                    // Create audio source and play
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);
                    
                    // Update status when playback completes
                    source.onended = () => {
                        updateStatus('listening', 'Listening...');
                    };
                    
                    source.start(0);
                } catch (audioError) {
                    console.log('Not audio data, skipping');
                }
            } catch (error) {
                console.error('Error playing audio response:', error);
                updateStatus('listening', 'Listening...');
            }
        }

        function speakText(text) {
            // Use Web Speech API to speak text
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                
                utterance.onend = () => {
                    updateStatus('listening', 'Ready - type your next message');
                };
                
                window.speechSynthesis.speak(utterance);
                console.log('🔊 Speaking:', text);
            } else {
                console.warn('Speech synthesis not supported');
                updateStatus('listening', 'Ready - type your next message');
            }
        }

        // ═══════════════════════════════════════════════════════════
        // AUDIO/VIDEO CAPTURE WITH REAL-TIME STREAMING
        // ═══════════════════════════════════════════════════════════

        let audioContext = null;
        let audioProcessor = null;
        let videoInterval = null;

        async function initializeAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 16000  // 16kHz for Gemini
                    }
                });

                // Create audio context
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 16000
                });

                const source = audioContext.createMediaStreamSource(audioStream);
                
                // Create script processor for audio chunks
                const bufferSize = 4096;
                audioProcessor = audioContext.createScriptProcessor(bufferSize, 1, 1);
                
                audioProcessor.onaudioprocess = (e) => {
                    if (!ws || ws.readyState !== WebSocket.OPEN) return;
                    
                    // Get audio data
                    const inputData = e.inputBuffer.getChannelData(0);
                    
                    // Convert Float32Array to Int16Array (PCM16)
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    
                    // Convert to base64
                    const base64Audio = arrayBufferToBase64(pcm16.buffer);
                    
                    // Send to backend
                    ws.send(JSON.stringify({
                        type: 'audio_chunk',
                        data: base64Audio
                    }));
                };
                
                // Connect nodes
                source.connect(audioProcessor);
                audioProcessor.connect(audioContext.destination);

                console.log('✅ Microphone access granted - streaming to Gemini');
                addTranscriptMessage('system', '🎤 Microphone ready - streaming audio');

            } catch (error) {
                console.error('Failed to access microphone:', error);
                addTranscriptMessage('system', '⚠️ Could not access microphone');
            }
        }

        async function initializeVideo() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                const videoElement = document.getElementById('videoFeed');
                videoElement.srcObject = videoStream;

                document.getElementById('videoContainer').style.display = 'block';

                // Capture and send video frames every 2 seconds
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                const ctx = canvas.getContext('2d');

                videoInterval = setInterval(() => {
                    if (!ws || ws.readyState !== WebSocket.OPEN) return;
                    
                    // Draw current frame to canvas
                    ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    
                    // Convert to JPEG base64
                    canvas.toBlob((blob) => {
                        blob.arrayBuffer().then(buffer => {
                            const base64Frame = arrayBufferToBase64(buffer);
                            
                            // Send to backend
                            ws.send(JSON.stringify({
                                type: 'video_frame',
                                data: base64Frame
                            }));
                        });
                    }, 'image/jpeg', 0.8);
                    
                }, 2000);  // Send frame every 2 seconds

                console.log('✅ Camera access granted - streaming to Gemini');
                addTranscriptMessage('system', '📹 Camera ready - streaming video');

            } catch (error) {
                console.error('Failed to access camera:', error);
                addTranscriptMessage('system', '⚠️ Could not access camera');
            }
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        function stopAudioCapture() {
            if (audioProcessor) {
                audioProcessor.disconnect();
                audioProcessor = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        function stopVideoCapture() {
            if (videoInterval) {
                clearInterval(videoInterval);
                videoInterval = null;
            }
        }

        // ═══════════════════════════════════════════════════════════
        // CHURN SCORING & OFFERS
        // ═══════════════════════════════════════════════════════════

        function requestOffer() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Session not connected');
                return;
            }

            // Simulate damage detection and frustration scoring
            // In real implementation, this would come from Gemini's analysis
            const damageTypes = ['wrong_item', 'broken', 'quality_issue', 'defective'];
            const damageLabel = damageTypes[Math.floor(Math.random() * damageTypes.length)];
            const frustrationScore = Math.random() * 10;

            updateStatus('speaking', 'Analyzing and generating offer...');

            ws.send(JSON.stringify({
                type: 'request_offer',
                damage_label: damageLabel,
                frustration_score: frustrationScore
            }));

            addTranscriptMessage('user', `Issue detected: ${damageLabel}, frustration: ${frustrationScore.toFixed(1)}/10`);
        }

        function detectChurnLevel(offerText) {
            const indicator = document.getElementById('churnIndicator');
            const text = document.getElementById('churnText');

            // Detect churn level from offer text patterns
            if (offerText.includes('free replacement') || offerText.includes('upgrading your loyalty')) {
                indicator.className = 'churn-indicator churn-critical';
                text.textContent = '⚠️ Churn Risk: CRITICAL';
            } else if (offerText.includes('priority reshipment') || offerText.includes('2-day delivery')) {
                indicator.className = 'churn-indicator churn-high';
                text.textContent = '⚠️ Churn Risk: HIGH';
            } else if (offerText.includes('discount') && offerText.includes('15%')) {
                indicator.className = 'churn-indicator churn-medium';
                text.textContent = '⚠️ Churn Risk: MEDIUM';
            } else {
                indicator.className = 'churn-indicator churn-low';
                text.textContent = '✅ Churn Risk: LOW';
            }

            indicator.style.display = 'block';
        }

        // ═══════════════════════════════════════════════════════════
        // UI HELPERS
        // ═══════════════════════════════════════════════════════════

        function displayCustomerInfo(customer) {
            const container = document.getElementById('customerInfo');
            const details = document.getElementById('customerDetails');

            const loyaltyClass = `badge-${customer.loyalty_tier}`;

            details.innerHTML = `
                <p><strong>${customer.name}</strong> <span class="loyalty-badge ${loyaltyClass}">${customer.loyalty_tier}</span></p>
                <p>📧 ${customer.email}</p>
                <p>📦 Total Orders: ${customer.total_orders} | Returns: ${customer.return_count}</p>
                <p>💰 Lifetime Value: $${customer.lifetime_value.toFixed(2)}</p>
                <p>📅 Customer for ${customer.tenure_months} months</p>
            `;

            container.style.display = 'block';
        }

        function updateStatus(status, text) {
            const statusElement = document.getElementById('status');
            const statusText = document.getElementById('statusText');

            statusElement.className = `status-indicator status-${status}`;
            statusText.textContent = text;
        }

        function addTranscriptMessage(role, text) {
            const transcript = document.getElementById('transcript');
            const message = document.createElement('div');

            const messageClass = role === 'system' ? 'message-system' : 
                                role === 'user' ? 'message-user' : 'message-agent';

            const timestamp = new Date().toLocaleTimeString();

            message.className = `message ${messageClass}`;
            message.innerHTML = `
                <div>${text}</div>
                <div class="message-timestamp">${timestamp}</div>
            `;

            transcript.appendChild(message);
            transcript.scrollTop = transcript.scrollHeight;
        }

        // ═══════════════════════════════════════════════════════════
        // KEYBOARD SHORTCUTS
        // ═══════════════════════════════════════════════════════════

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !document.getElementById('setupSection').classList.contains('hidden')) {
                startSession();
            }
        });

        // Auto-focus customer ID input
        window.addEventListener('load', () => {
            document.getElementById('customerId').focus();
        });
    </script>
</body>
</html>
